<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation | Whitepaper & Legal</title>
    
    <!-- Mammoth.js for rendering DOCX files in the browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        /* Enterprise-Grade CSS Variables */
        :root {
            --bg-body: #ffffff;
            --bg-sidebar: #f8fafc;
            --bg-overlay: rgba(15, 23, 42, 0.5);
            --text-main: #334155;
            --text-heading: #0f172a;
            --text-muted: #64748b;
            --accent: #0f172a;
            --accent-light: #f1f5f9;
            --border: #e2e8f0;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --header-height: 60px;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            color: var(--text-main);
            background-color: var(--bg-body);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Mobile Header */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-height);
            background: var(--bg-body);
            border-bottom: 1px solid var(--border);
            z-index: 40;
            align-items: center;
            padding: 0 1.5rem;
            justify-content: space-between;
        }

        .menu-toggle {
            background: none; border: none; cursor: pointer;
            padding: 0.5rem; margin-left: -0.5rem;
            color: var(--text-heading);
        }

        .brand-mobile {
            font-weight: 700; color: var(--text-heading);
            text-decoration: none; font-size: 1.1rem;
        }

        /* Layout Container */
        .layout { display: flex; min-height: 100vh; }

        /* Sidebar Navigation */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            position: fixed; top: 0; bottom: 0; left: 0;
            overflow-y: auto; padding: 2.5rem 1.5rem;
            z-index: 50; transition: transform 0.3s ease;
        }

        .brand-desktop {
            font-size: 1.25rem; font-weight: 800;
            color: var(--text-heading); text-decoration: none;
            display: block; margin-bottom: 3rem;
            letter-spacing: -0.02em;
        }

        .nav-group { margin-bottom: 2.5rem; }
        .nav-title {
            font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 0.08em; font-weight: 700;
            color: var(--text-muted); margin-bottom: 1rem;
            padding-left: 0.75rem;
        }

        .nav-link {
            display: block; padding: 0.5rem 0.75rem;
            color: var(--text-main); text-decoration: none;
            font-size: 0.95rem; border-radius: 6px;
            cursor: pointer; transition: all 0.2s; margin-bottom: 0.25rem;
        }

        .nav-link:hover, .nav-link.active {
            background-color: var(--accent-light);
            color: var(--accent); font-weight: 500;
        }

        /* Mobile Overlay Backdrop */
        .sidebar-overlay {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-overlay);
            z-index: 45; opacity: 0; transition: opacity 0.3s ease;
        }

        /* Main Content Area */
        .main-content {
            flex: 1; margin-left: var(--sidebar-width);
            padding: 4rem 2rem; width: 100%;
        }

        .content-wrapper {
            max-width: 75ch; margin: 0 auto;
        }

        /* View Switching (Tabs) */
        .doc-view { display: none; animation: fadeIn 0.4s ease; }
        .doc-view.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading State */
        .loader {
            display: flex; align-items: center; justify-content: center;
            padding: 4rem; color: var(--text-muted); font-style: italic;
        }

        /* Dynamic DOCX Typography Styles */
        .docx-container h1 { font-size: 2.5rem; font-weight: 800; color: var(--text-heading); margin-bottom: 1.5rem; line-height: 1.2; }
        .docx-container h2 { font-size: 1.5rem; font-weight: 700; color: var(--text-heading); margin: 3rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
        .docx-container h3 { font-size: 1.2rem; font-weight: 600; color: var(--text-heading); margin: 2rem 0 1rem; }
        .docx-container p { margin-bottom: 1.25rem; font-size: 1.05rem; }
        .docx-container ul, .docx-container ol { margin-bottom: 1.5rem; padding-left: 1.5rem; font-size: 1.05rem; }
        .docx-container li { margin-bottom: 0.5rem; }
        .docx-container table { width: 100%; border-collapse: collapse; margin: 2rem 0; font-size: 0.95rem; }
        .docx-container th, .docx-container td { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border); }
        .docx-container img { max-width: 100%; height: auto; border-radius: 8px; margin: 1.5rem 0; }
        
        .error-message {
            background: #fef2f2; border: 1px solid #f87171; color: #991b1b;
            padding: 1.5rem; border-radius: 8px; margin-top: 2rem;
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .mobile-header { display: flex; }
            .main-content { margin-left: 0; padding: calc(var(--header-height) + 2rem) 1.5rem 3rem; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; opacity: 1; }
            .brand-desktop { display: none; }
            .docx-container h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Mobile Header -->
    <header class="mobile-header">
        <button class="menu-toggle" id="menuBtn" aria-label="Toggle Menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <a href="#" class="brand-mobile">Acme Corp</a>
        <div style="width: 24px;"></div>
    </header>

    <div class="layout">
        <div class="sidebar-overlay" id="overlay"></div>

        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <a href="#" class="brand-desktop">AnonRoom</a>
            <nav>
                <div class="nav-group">
                    <div class="nav-title">Documents</div>
                    <a class="nav-link active" onclick="switchView('whitepaper', this)">Whitepaper</a>
                    <a class="nav-link" onclick="switchView('terms', this)">Terms & Conditions</a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-wrapper">
                
                <!-- Whitepaper Container -->
                <div id="whitepaper" class="doc-view active">
                    <div id="whitepaper-content" class="docx-container">
                        <div class="loader">Fetching and rendering whitepaper.docx...</div>
                    </div>
                </div>

                <!-- Terms & Conditions Container -->
                <div id="terms" class="doc-view">
                    <div id="terms-content" class="docx-container">
                        <div class="loader">Fetching and rendering T&Cs.docx...</div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        // --- 1. UI Interaction Logic ---
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        document.getElementById('menuBtn').addEventListener('click', () => {
            sidebar.classList.add('open');
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
            document.body.style.overflow = '';
        });

        function switchView(viewId, element) {
            // Update active states
            document.querySelectorAll('.doc-view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            element.classList.add('active');
            
            // Close mobile menu if open
            if (window.innerWidth <= 900) {
                sidebar.classList.remove('open');
                overlay.classList.remove('open');
                document.body.style.overflow = '';
            }
            window.scrollTo(0,0);
        }

        // --- 2. DOCX Rendering Logic ---
        async function loadDocx(fileName, containerId) {
            const container = document.getElementById(containerId);
            
            try {
                const response = await fetch(fileName);
                
                if (!response.ok) {
                    throw new Error(`Could not fetch ${fileName}. Status: ${response.status}`);
                }
                
                const arrayBuffer = await response.arrayBuffer();
                
                // Convert DOCX to HTML using Mammoth
                const result = await mammoth.convertToHtml({ arrayBuffer: arrayBuffer });
                
                // Inject the converted HTML into our container
                container.innerHTML = result.value;
                
                // Console warning if Mammoth found formatting issues
                if (result.messages.length > 0) {
                    console.log(`Mammoth messages for ${fileName}:`, result.messages);
                }

            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <div class="error-message">
                        <h3>Error Loading Document</h3>
                        <p>Could not load <strong>${fileName}</strong>.</p>
                        <p><strong>Troubleshooting:</strong></p>
                        <ul>
                            <li>Ensure exactly <code>${fileName}</code> is in the same folder as this index.html file.</li>
                            <li>Because of browser security rules, <strong>you cannot just double-click index.html</strong> to open it if you are fetching local files. You must use a local web server (e.g., Live Server in VS Code).</li>
                        </ul>
                    </div>
                `;
            }
        }

        // Trigger the loading of both documents as soon as the page loads
        window.addEventListener('DOMContentLoaded', () => {
            loadDocx('whitepaper.docx', 'whitepaper-content');
            loadDocx('T&Cs.docx', 'terms-content');
        });
    </script>
</body>
</html>
